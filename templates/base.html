<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}SafeX Attendance{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="/">SafeX <span class="fw-light">Attendance</span></a>
      <div>
        <a class="nav-link d-inline text-light me-3" href="{{ url_for('attendance.checkin_page') }}">Check-in</a>
        <a class="nav-link d-inline text-light" href="{{ url_for('dashboard.dashboard') }}">Dashboard</a>
      </div>
    </div>
  </nav>
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
