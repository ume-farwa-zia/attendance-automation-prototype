{% extends "base.html" %}
{% block title %}Check-in rejected — SafeX Attendance{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 text-center">
    <div class="card shadow-sm p-4">
      <div class="status-icon rejected">&#10005;</div>
      <h4 class="mt-3">Check-in not accepted</h4>
      <p class="text-muted">Please contact HR if you believe this is a mistake.</p>
      <a href="{{ url_for('attendance.checkin_page') }}" class="btn btn-brand mt-2">Try again</a>
    </div>
  </div>
</div>
{% endblock %}
